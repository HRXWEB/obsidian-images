<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 700" width="900" height="700">
  <!-- Simulated Excalidraw auto-export SVG for testing -->
  <rect x="0" y="0" width="900" height="700" fill="#ffffff" />

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="Virgil, sans-serif"
        font-size="24" fill="#1e1e1e" font-weight="bold">Excalidraw Integration Test</text>

  <!-- ===== Section 1: External Link ===== -->
  <text x="150" y="80" text-anchor="middle" font-family="Virgil, sans-serif"
        font-size="14" fill="#868e96">1. External Link</text>
  <a href="https://github.com/zsviczian/obsidian-excalidraw-plugin" target="_blank">
    <rect x="50" y="95" width="200" height="50" rx="8" ry="8"
          fill="#a5d8ff" stroke="#1971c2" stroke-width="2" />
    <text x="150" y="125" text-anchor="middle" font-family="Virgil, sans-serif"
          font-size="13" fill="#1e1e1e">Excalidraw GitHub →</text>
  </a>

  <!-- ===== Section 2: Internal Wikilink (obsidian:// protocol) ===== -->
  <text x="450" y="80" text-anchor="middle" font-family="Virgil, sans-serif"
        font-size="14" fill="#868e96">2. Internal Note Link</text>
  <a href="obsidian://open?vault=quartz&amp;file=blog%2FObsidian-Quartz-Blog-Setup-and-Configuration-Guide">
    <rect x="330" y="95" width="240" height="50" rx="8" ry="8"
          fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" />
    <text x="450" y="125" text-anchor="middle" font-family="Virgil, sans-serif"
          font-size="13" fill="#1e1e1e">Quartz 配置指南 (内链)</text>
  </a>

  <!-- ===== Section 3: Another external link ===== -->
  <text x="750" y="80" text-anchor="middle" font-family="Virgil, sans-serif"
        font-size="14" fill="#868e96">3. Blog Home Link</text>
  <a href="https://blog.rickyyel.org">
    <rect x="650" y="95" width="200" height="50" rx="8" ry="8"
          fill="#ffd8a8" stroke="#e8590c" stroke-width="2" />
    <text x="750" y="125" text-anchor="middle" font-family="Virgil, sans-serif"
          font-size="14" fill="#1e1e1e">blog.rickyyel.org →</text>
  </a>

  <!-- ===== Section 4: YouTube Embed via foreignObject ===== -->
  <text x="300" y="185" text-anchor="middle" font-family="Virgil, sans-serif"
        font-size="14" fill="#868e96">4. YouTube Embed (foreignObject iframe)</text>
  <rect x="50" y="195" width="500" height="310" rx="4" ry="4"
        fill="none" stroke="#c084fc" stroke-width="2" stroke-dasharray="5,5" />
  <foreignObject x="55" y="200" width="490" height="300">
    <body xmlns="http://www.w3.org/1999/xhtml" style="margin:0;padding:0;overflow:hidden;">
      <iframe
        width="490" height="300"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        title="YouTube video player"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen="true"
        style="border:none;">
      </iframe>
    </body>
  </foreignObject>

  <!-- ===== Section 5: External Web Page Embed via foreignObject ===== -->
  <text x="730" y="185" text-anchor="middle" font-family="Virgil, sans-serif"
        font-size="14" fill="#868e96">5. Web Page Embed</text>
  <rect x="580" y="195" width="310" height="310" rx="4" ry="4"
        fill="none" stroke="#f59f00" stroke-width="2" stroke-dasharray="5,5" />
  <foreignObject x="585" y="200" width="300" height="300">
    <body xmlns="http://www.w3.org/1999/xhtml" style="margin:0;padding:0;overflow:hidden;">
      <iframe
        width="300" height="300"
        src="https://excalidraw.com"
        title="Excalidraw Web App"
        frameborder="0"
        style="border:none;">
      </iframe>
    </body>
  </foreignObject>

  <!-- ===== Section 6: Internal Note Embed via foreignObject ===== -->
  <text x="450" y="535" text-anchor="middle" font-family="Virgil, sans-serif"
        font-size="14" fill="#868e96">6. Internal Note Embed (obsidian:// iframe)</text>
  <rect x="150" y="545" width="600" height="130" rx="4" ry="4"
        fill="none" stroke="#20c997" stroke-width="2" stroke-dasharray="5,5" />
  <foreignObject x="155" y="550" width="590" height="120">
    <body xmlns="http://www.w3.org/1999/xhtml" style="margin:0;padding:0;overflow:hidden;">
      <iframe
        width="590" height="120"
        src="obsidian://open?vault=quartz&amp;file=blog%2FObsidian-Quartz-Blog-Setup-and-Configuration-Guide"
        title="Internal Note Preview"
        frameborder="0"
        style="border:none;background:#f8f9fa;">
      </iframe>
    </body>
  </foreignObject>

  <!-- Footer -->
  <text x="450" y="690" text-anchor="middle" font-family="Virgil, sans-serif"
        font-size="11" fill="#868e96">Tests: links (external/internal), YouTube iframe, web page iframe, obsidian:// iframe rewrite</text>
</svg>
