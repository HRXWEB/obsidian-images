<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Simulated Excalidraw auto-export SVG for testing -->
  <rect x="0" y="0" width="400" height="300" fill="#ffffff" />

  <!-- A simple hand-drawn style rectangle -->
  <rect x="50" y="40" width="300" height="80" rx="8" ry="8"
        fill="#a5d8ff" stroke="#1971c2" stroke-width="2" />
  <text x="200" y="85" text-anchor="middle" font-family="Virgil, sans-serif"
        font-size="20" fill="#1e1e1e">Excalidraw Test Drawing</text>

  <!-- A circle -->
  <ellipse cx="120" cy="200" rx="60" ry="60"
           fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" />
  <text x="120" y="205" text-anchor="middle" font-family="Virgil, sans-serif"
        font-size="14" fill="#1e1e1e">Hello</text>

  <!-- An arrow connecting shapes -->
  <line x1="180" y1="200" x2="240" y2="200" stroke="#1e1e1e" stroke-width="2" />
  <polygon points="240,195 250,200 240,205" fill="#1e1e1e" />

  <!-- Another rectangle with a link -->
  <a href="https://blog.rickyyel.org">
    <rect x="250" y="170" width="120" height="60" rx="8" ry="8"
          fill="#ffd8a8" stroke="#e8590c" stroke-width="2" />
    <text x="310" y="205" text-anchor="middle" font-family="Virgil, sans-serif"
          font-size="14" fill="#1e1e1e">Click Me!</text>
  </a>

  <!-- Footer text -->
  <text x="200" y="280" text-anchor="middle" font-family="Virgil, sans-serif"
        font-size="12" fill="#868e96">Interactive SVG - links work when inlined</text>
</svg>
